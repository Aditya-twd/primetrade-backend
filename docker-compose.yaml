# Standalone backend stack: MongoDB + API.
# The frontend is deployed separately (Vercel), so it's not included here.
#
#   docker compose up --build
#
# API:     http://localhost:5000/api/v1
# Swagger: http://localhost:5000/api/v1/docs
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/primetrade
      # CHANGE these secrets for any real deployment.
      JWT_ACCESS_SECRET: change_me_access_secret
      JWT_REFRESH_SECRET: change_me_refresh_secret
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_EXPIRES: 7d
      # Allow local dev + the deployed Vercel frontend.
      CORS_ORIGIN: http://localhost:5173,https://primetrade-frontend-pied.vercel.app
      SEED_ADMIN_EMAIL: admin@primetrade.ai
      SEED_ADMIN_PASSWORD: Admin@12345
    ports:
      - "5000:5000"

volumes:
  mongo-data:
